name: Build AppImage

on:
  push:
    branches:
      - master  # Cambia esto a la rama que prefieras
    paths:
      - 'lib/**.[ch]'
      - 'lib/**.cpp'
      - 'src/**.[ch]'
      - 'src/**.cpp'
      - '**/CMakeLists.txt'
      - 'cmake/Modules/**'
      - 'util/buildbot/**'
      - 'misc/AppImageBuilder.yml'
      - 'util/ci/**'
      - '.github/workflows/**.yml'
      - 'Dockerfile'
      - '.dockerignore'

env:
  CMAKE_BUILD_TYPE: 'Release'
  VERSION: '1.0.0'  # Define la versión aquí

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang \
            gdb \
            ninja-build \
            python3-pip \
            python3-setuptools \
            patchelf \
            desktop-file-utils \
            libgdk-pixbuf2.0-dev \
            fakeroot \
            strace \
            fuse \
            sshpass

          # Instalar AppImage Tool
          sudo wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

          # Instalar AppImage Builder
          sudo pip3 install git+https://github.com/AppImageCrafters/appimage-builder.git

      - name: Build AppImage
        run: |
          appimage-builder --recipe misc/AppImageBuilder.yml

      - name: Prepare Upload
        run: |
          mv ./*.AppImage luanti.AppImage
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: luanti-appimage
          path: luanti.AppImage
          if-no-files-found: error
